<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập cùng nhau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Màu nền pastel nhẹ nhàng */
        body { background-color: #f0fdfa; font-family: sans-serif; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <div class="w-1/4 bg-white p-6 rounded-3xl shadow-lg">
        <h2 class="font-bold text-emerald-800 text-lg mb-4">Lịch học</h2>
        <div id="calendar" class="text-emerald-600">Hiển thị lịch tại đây</div>
    </div>

    <div class="w-2/4 flex flex-col gap-4">
        <div class="bg-white p-8 rounded-3xl shadow-lg text-center">
            <h1 class="text-2xl font-bold text-emerald-700 mb-4">Giờ học</h1>
            <div id="display" class="text-6xl font-mono font-bold text-emerald-600 mb-6">00:00:00</div>
            <button id="startBtn" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-lg hover:bg-emerald-600 transition">
                Bắt đầu học
            </button>
        </div>
        <div class="flex-grow bg-emerald-100 rounded-3xl flex items-center justify-center border-2 border-dashed border-emerald-300">
            <span class="text-emerald-700 font-medium">Màn hình video call</span>
        </div>
    </div>

    <div class="w-1/4 flex flex-col gap-4">
        <div class="bg-white p-6 rounded-3xl shadow-lg text-center">
            <div class="w-20 h-20 bg-emerald-200 rounded-full mx-auto mb-3"></div>
            <p class="font-bold text-lg">Tên tài khoản</p>
        </div>
        <div class="flex-grow bg-white p-6 rounded-3xl shadow-lg flex flex-col">
            <h2 class="font-bold text-emerald-800 text-lg mb-4">Phòng chat</h2>
            <div class="flex-grow"></div>
            <input type="text" placeholder="Message..." class="w-full p-3 bg-emerald-50 rounded-xl border border-emerald-200">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEwXt2HFodIw426l_cmQ5Sk9QA185w8gA",
            authDomain: "studywithmeanytime-7a4c7.firebaseapp.com",
            projectId: "studywithmeanytime-7a4c7",
            storageBucket: "studywithmeanytime-7a4c7.firebasestorage.app",
            messagingSenderId: "955853276835",
            appId: "1:955853276835:web:5c2144a69bc28d6902e116"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let seconds = 0;
        let timer;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            if (startBtn.innerText === 'Bắt đầu học') {
                timer = setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    display.innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
                startBtn.innerText = 'Dừng học';
                startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
            } else {
                clearInterval(timer);
                try {
                    await addDoc(collection(db, "study_sessions"), {
                        totalSeconds: seconds,
                        createdAt: new Date()
                    });
                    alert("Đã lưu thành công " + seconds + " giây học tập!");
                } catch (e) {
                    alert("Lỗi lưu dữ liệu: " + e.message);
                }
                startBtn.innerText = 'Bắt đầu học';
                startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
                seconds = 0;
                display.innerText = "00:00:00";
            }
        });
    </script>
</body>
</html>
