<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập cùng nhau</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl text-center w-80">
        <h1 class="text-2xl font-bold text-emerald-700 mb-4">Giờ học</h1>
        <div id="display" class="text-5xl font-mono font-bold text-emerald-600 mb-6">00:00:00</div>
        
        <button id="startBtn" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600">
            Bắt đầu học
        </button>
    </div>

    <script>
        let seconds = 0;
        let timer;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', () => {
            if (startBtn.innerText === 'Bắt đầu học') {
                timer = setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    display.innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
                startBtn.innerText = 'Dừng học';
                startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
            } else {
                clearInterval(timer);
                startBtn.innerText = 'Bắt đầu học';
                startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
            }
        });
    </script>
</body>
</html>
