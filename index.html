<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập cùng nhau</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl text-center w-80">
        <h1 class="text-2xl font-bold text-emerald-700 mb-4">Giờ học</h1>
        <div id="display" class="text-5xl font-mono font-bold text-emerald-600 mb-6">00:00:00</div>
        
        <button id="startBtn" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600">
            Bắt đầu học
        </button>
    </div>

    <script>
        let seconds = 0;
        let timer;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', () => {
            if (startBtn.innerText === 'Bắt đầu học') {
                timer = setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    display.innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
                startBtn.innerText = 'Dừng học';
                startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
            } else {
    clearInterval(timer);
    // Gửi dữ liệu lên Firestore
    window.db.collection("study_sessions").add({
        totalSeconds: seconds,
        timestamp: new Date()
    });
    alert("Đã lưu " + seconds + " giây học tập!");
    
    startBtn.innerText = 'Bắt đầu học';
    startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
    seconds = 0; // Reset đồng hồ về 0
    display.innerText = "00:00:00";
}
        });
    </script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEwXt2HFodIw426l_cmQ5Sk9QA185w8gA",
        authDomain: "studywithmeanytime-7a4c7.firebaseapp.com",
        projectId: "studywithmeanytime-7a4c7",
        storageBucket: "studywithmeanytime-7a4c7.firebasestorage.app",
        messagingSenderId: "955853276835",
        appId: "1:955853276835:web:5c2144a69bc28d6902e116"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Gán biến db vào window để phần script đồng hồ có thể dùng được
    window.db = db;
    console.log("Firebase & Firestore đã sẵn sàng!");
</script>
    </body>
</html>
