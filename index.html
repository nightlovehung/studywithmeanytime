<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập cùng nhau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', sans-serif; }
        .hidden-menu { display: none; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <div class="w-1/4 bg-white p-6 rounded-3xl shadow-sm">
        <h2 class="font-bold text-emerald-800 mb-4">Lịch học</h2>
    </div>

    <div class="w-2/4 flex flex-col gap-4">
        <div class="bg-white p-8 rounded-3xl shadow-sm text-center">
            <h1 class="text-xl font-bold text-emerald-700">Giờ học</h1>
            <div id="display" class="text-5xl font-mono font-bold text-emerald-600 my-4">00:00:00</div>
            <button id="startBtn" class="bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold">▷ Bắt đầu học</button>
        </div>
        <div class="flex-grow bg-emerald-900 rounded-3xl flex items-center justify-center text-white">Màn hình video call</div>
    </div>

    <div class="w-1/4 flex flex-col gap-4">
        <div class="relative bg-white p-4 rounded-3xl shadow-sm text-center">
            <button id="avatarBtn" class="w-16 h-16 bg-emerald-200 rounded-full mx-auto"></button>
            <p class="font-bold mt-2">Tên của bạn</p>
            <div id="userMenu" class="hidden-menu absolute top-20 right-0 w-full bg-white shadow-xl rounded-2xl p-4 border">
                <button class="block w-full py-2 hover:bg-emerald-50">Trang chủ</button>
                <button class="block w-full py-2 hover:bg-emerald-50">Chỉnh sửa tên</button>
            </div>
        </div>
        <div class="flex-grow bg-white p-4 rounded-3xl shadow-sm">
            <h2 class="font-bold text-emerald-800">Phòng chat</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // CẤU HÌNH CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyAEwXt2HFodIw426l_cmQ5Sk9QA185w8gA",
            authDomain: "studywithmeanytime-7a4c7.firebaseapp.com",
            projectId: "studywithmeanytime-7a4c7",
            storageBucket: "studywithmeanytime-7a4c7.firebasestorage.app",
            messagingSenderId: "955853276835",
            appId: "1:955853276835:web:5c2144a69bc28d6902e116"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Logic ẩn/hiện menu
        document.getElementById('avatarBtn').addEventListener('click', () => {
            document.getElementById('userMenu').classList.toggle('hidden-menu');
        });

        // Logic đồng hồ & Lưu Firebase
        let seconds = 0;
        let timer;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            if (startBtn.innerText === '▷ Bắt đầu học') {
                timer = setInterval(() => {
                    seconds++;
                    let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    display.innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
                startBtn.innerText = '▯▯ Dừng học';
                startBtn.classList.replace('bg-emerald-500', 'bg-red-500');
            } else {
                clearInterval(timer);
                try {
                    await addDoc(collection(db, "study_sessions"), {
                        totalSeconds: seconds,
                        createdAt: new Date()
                    });
                    alert("Đã lưu " + seconds + " giây!");
                } catch (e) { alert("Lỗi: " + e.message); }
                
                startBtn.innerText = '▷ Bắt đầu học';
                startBtn.classList.replace('bg-red-500', 'bg-emerald-500');
                seconds = 0;
                display.innerText = "00:00:00";
            }
        });
    </script>
</body>
</html>
